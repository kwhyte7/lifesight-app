name: "lifesight-app"

services:
  backend:
    build: ./backend
    #ports:
    #  - "8000:8000" # don't actually think we need to expose any ports, other than for api access.
    environment:
      # - DATABASE_URL=postgresql://user:pass@db:5432/dbname  # If using database
      - DATABASE_URL=sqlite://mock_data.db
    volumes:
      - ./backend:/app  # Mount for development with hot reload
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "8080:8080" # i'm not going to run nginx like deepseek suggested - not yet.
    depends_on:
      - backend
    networks:
      - app-network
    # For development with hot reload, use this instead of building:
    # build:
    #   context: ./frontend
    #   target: build  # Use the build stage
    # command: npm run dev -- --host 0.0.0.0
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules

networks:
  app-network:
    driver: bridge
